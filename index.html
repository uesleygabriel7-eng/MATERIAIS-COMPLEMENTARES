        const defaultInputs = {

          const n = typeof v === "number" ? v : parseFloat(String(v ?? "").replace(",", "."));
          return Number.isFinite(n) ? n : 0;
        };

        const rowParams = {

        const computedFormulas = {
          33: { formula: "= Chapa União de Terça", compute: (q) => num(q[32]) },
          34: { formula: "= Cartola × 2", compute: (q) => num(q[31]) * 2 },
          35: { formula: "= Haste União Terça + Haste Cartola", compute: (q) => num(q[33]) + num(q[34]) },
          37: { formula: "= Chumbador 1/2''", compute: (q) => num(q[36]) },

          73: {
            formula: "ROUNDUP((Comp/0,98 × 3) × Apoios × 1,1 × Caimentos)",
            compute: (_q, i) => Math.ceil(((i.telhaCompPredio / 0.98) * 3) * i.telhaNumApoios * 1.1 * i.telhaNumCaimentos),

          91: { formula: "= Chapa União Calha ÷ 10", compute: (q) => num(q[87]) / 10 },
          92: {
            formula: 'SE seção="40x62": Haste União Calha × 2,15',
            compute: (q, i) => (i.secaoCalha === "40x62" ? num(q[90]) * 2.15 : 0),
          },

            formula: 'SE seção="40x60": Haste União Calha × 2,65',
            compute: (q, i) => (i.secaoCalha === "40x60" ? num(q[90]) * 2.65 : 0),
          },
          125: {
            formula: "= (CalhaFix10 + CalhaFix10-20 + CalhaFix12) × 3",
            compute: (q) => (num(q[105]) + num(q[106]) + num(q[107])) * 3,
          },
          126: {
            formula: "= Fixação Individual + Fixação União",
            compute: (q) => num(q[111]) + num(q[112]),
          },
          127: { formula: "= Matajunta × 2", compute: (q) => num(q[108]) * 2 },
          128: {
            formula: "ROUND(Metragem metalão ÷ 6)",
            compute: (_q, i) => Math.round(i.metragemMetalao / 6),
          },
          129: {
            formula: "ROUNDUP(Parabolt 3/8 ÷ 40)",
            compute: (q) => Math.ceil(num(q[127]) / 40),
          },
          130: {
            formula: "ROUNDUP(Parabolt 1/2 ÷ 40)",
            compute: (q) => Math.ceil(num(q[126]) / 40),
          },
          132: {
            formula: "ROUNDUP((H×2 + Vint×4 + Vext×3) ÷ 3,9)",
            compute: (_q, i) => Math.ceil((i.consolesHorizontal * 2 + i.consolesVerticalInterna * 4 + i.consolesVerticalExterna * 3) / 3.9),
          },
        };

        const isComputed = (row) => row in computedFormulas;

        // ==========================================
        // MOTOR DO APLICATIVO
        // ==========================================
        const buildInitialQuant = () => {
          const map = {};
          for (const s of sections) {
            for (const r of s.rows) {
              if (r.isSubheader) continue;
              if (isComputed(r.row)) continue;
              map[r.row] = r.default !== "" && r.default != null ? String(r.default) : "";
            }
          }
          return map;
        };

        const formatQty = (n) => {
          if (!Number.isFinite(n)) return "—";
          if (Number.isInteger(n)) return n.toLocaleString("pt-BR");
          return n.toLocaleString("pt-BR", { maximumFractionDigits: 2 });
        };

        const FIREBASE_BASE = "https://materiais-complementares-default-rtdb.firebaseio.com";

        function MaterialsApp() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [senha, setSenha] = useState("");
          const [erroLogin, setErroLogin] = useState("");

          const [usuario, setUsuario] = useState("");
          const [projetoAtual, setProjetoAtual] = useState("");
          const [listaProjetos, setListaProjetos] = useState([]);
          const [loadingProjetos, setLoadingProjetos] = useState(false);
          const [statusSalvamento, setStatusSalvamento] = useState("");

          const [obra, setObra] = useState("");
          const [responsavel, setResponsavel] = useState("");
          const [data, setData] = useState(() => new Date().toISOString().slice(0, 10));
          const [inputs, setInputs] = useState(defaultInputs);
          const [quant, setQuant] = useState(buildInitialQuant);
          const [overrides, setOverrides] = useState({}); 
          const [filtro, setFiltro] = useState("todos");

          useEffect(() => {
            if (!usuario) return;
            setLoadingProjetos(true);
            fetch(`${FIREBASE_BASE}/usuarios/${usuario}/projetos.json`, { cache: "no-store" })
              .then((res) => res.json())
              .then((data) => {
                setListaProjetos(data ? Object.keys(data) : []);
                setLoadingProjetos(false);
              })
              .catch(() => setLoadingProjetos(false));
          }, [usuario]);

          const criarProjeto = () => {
            let nome = prompt("Digite o nome do novo projeto:");
            if (!nome) return;
            nome = nome.replace(/[.#$\[\]]/g, "").trim();
            if (nome === "") return;

            if (listaProjetos.includes(nome)) {
              alert("Já existe um projeto com este nome!");
              return;
            }

            setStatusSalvamento("Criando...");
            const dadosIniciais = {
              obra: nome,
              responsavel: usuario,
              data: new Date().toISOString().slice(0, 10),
              inputs: defaultInputs,
              quant: buildInitialQuant(),
              overrides: {}
            };

            fetch(`${FIREBASE_BASE}/usuarios/${usuario}/projetos/${nome}.json`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(dadosIniciais)
            }).then(() => {
              setListaProjetos([...listaProjetos, nome]);
              setStatusSalvamento("");
              selecionarProjeto(nome);
            });
          };

          const deletarProjeto = (nome) => {
            if (confirm(`Tem certeza que deseja apagar permanentemente o projeto "${nome}"?`)) {
              fetch(`${FIREBASE_BASE}/usuarios/${usuario}/projetos/${nome}.json`, {
                method: "DELETE"
              }).then(() => {
                setListaProjetos(listaProjetos.filter(p => p !== nome));
              });
            }
          };

          const selecionarProjeto = (nome) => {
            setStatusSalvamento("Carregando projeto...");
            fetch(`${FIREBASE_BASE}/usuarios/${usuario}/projetos/${nome}.json`, { cache: "no-store" })
              .then((res) => res.json())
              .then((d) => {
                if (d) {
                  setObra(d.obra || nome);
                  setResponsavel(d.responsavel || usuario);
                  setData(d.data || new Date().toISOString().slice(0, 10));
                  setInputs(d.inputs || defaultInputs);
                  setQuant(d.quant || buildInitialQuant());
                  setOverrides(d.overrides || {}); 
                } else {
                  setObra(nome);
                  setResponsavel(usuario);
                  setData(new Date().toISOString().slice(0, 10));
                  setInputs(defaultInputs);
                  setQuant(buildInitialQuant());
                  setOverrides({});
                }
                setProjetoAtual(nome);
                setStatusSalvamento("");
              });
          };

          const salvarDados = () => {
            setStatusSalvamento("Salvando...");
            fetch(`${FIREBASE_BASE}/usuarios/${usuario}/projetos/${projetoAtual}.json`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ obra, responsavel, data, inputs, quant, overrides })
            }).then(() => {
              setStatusSalvamento("Salvo na nuvem!");
              setTimeout(() => setStatusSalvamento(""), 2000);
            });
          };

          const computedQty = useMemo(() => {
            const map = {};
            for (const s of sections) {
              for (const r of s.rows) {
                if (r.isSubheader) continue;
                if (!isComputed(r.row)) {
                  const v = parseFloat((quant[r.row] ?? "").toString().replace(",", "."));
                  map[r.row] = Number.isFinite(v) ? v : 0;
                }
              }
            }
            const computedRows = Object.keys(computedFormulas).map(Number).sort((a, b) => a - b);
            for (const r of computedRows) {
              if (overrides[r] !== undefined && overrides[r] !== "") {
                map[r] = parseFloat(overrides[r].toString().replace(",", ".")) || 0;
              } else {
                map[r] = computedFormulas[r].compute(map, inputs);
              }
            }
            return map;
          }, [quant, inputs, overrides]);

          const totalLinhasPreenchidas = sections.reduce(
            (acc, s) => acc + s.rows.filter((r) => !r.isSubheader && (computedQty[r.row] ?? 0) > 0).length, 0
          );

          const reset = () => {
            if (confirm("Limpar todos os campos da lista deste projeto?")) {
              setInputs(defaultInputs);
              setQuant(buildInitialQuant());
              setOverrides({});
            }
          };

          const updateInput = (key, value) => setInputs((p) => ({ ...p, [key]: value }));

          const handleLogin = (e) => {
            e.preventDefault();
            if (senha === "PROD2026") {
              setIsAuthenticated(true);
              setErroLogin("");
            } else {
              setErroLogin("Senha incorreta. Acesso bloqueado.");

          };

          if (!isAuthenticated) {
            return (

          }

          if (!projetoAtual) {
            return (
              <div className="min-h-screen bg-slate-50 p-6 md:p-12">
                <div className="max-w-4xl mx-auto">
                  <div className="flex items-center justify-between mb-8">
                    <div>
                      <h1 className="text-3xl font-bold text-slate-800">Meus Projetos</h1>
                      <p className="text-slate-500 mt-1">Bem-vindo(a), {usuario}. Gerencie suas obras abaixo.</p>
                    </div>
                    <button onClick={() => setUsuario("")} className="text-sm font-medium text-slate-500 hover:text-red-600 transition">Trocar Usuário</button>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                      <span className="font-semibold text-slate-700">Lista de Obras</span>
                      <button onClick={criarProjeto} className="flex items-center gap-2 text-sm bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md transition font-medium"><IconPlus /> Novo Projeto</button>
                    </div>
                    <div className="divide-y divide-slate-100">
                      {loadingProjetos ? (
                        <div className="p-8 text-center text-slate-500">Carregando projetos...</div>
                      ) : listaProjetos.length === 0 ? (
                        <div className="p-12 text-center text-slate-400">
                          <p>Nenhum projeto encontrado.</p>
                          <p className="text-sm mt-1">Clique em "Novo Projeto" para começar.</p>
                        </div>
                      ) : (
                        listaProjetos.map((proj) => (
                          <div key={proj} className="flex items-center justify-between p-4 hover:bg-slate-50 transition group">
                            <button onClick={() => selecionarProjeto(proj)} className="flex-1 text-left font-semibold text-slate-700 text-lg group-hover:text-blue-600 transition">{proj}</button>
                            <button onClick={() => deletarProjeto(proj)} className="text-slate-400 hover:text-red-500 p-2 rounded-md hover:bg-red-50 transition" title="Excluir projeto"><IconTrash /></button>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-white text-slate-900">
              <div className="print:hidden">
                <header className="border-b border-slate-200 bg-white sticky top-0 z-10 shadow-sm">
                  <div className="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between gap-4">
                    <div className="flex items-center gap-4">
                      <button onClick={() => setProjetoAtual("")} className="p-2 -ml-2 rounded-md text-slate-500 hover:bg-slate-100 hover:text-slate-800 transition" title="Voltar para projetos"><IconArrowLeft /></button>
                      <div className="h-10 w-10 rounded-lg bg-blue-600 text-white flex items-center justify-center"><IconCalculator /></div>
                      <div>
                        <h1 className="text-xl font-bold leading-tight">{projetoAtual}</h1>
                        <p className="text-xs text-slate-500">Logado como {usuario}</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      {statusSalvamento && <span className="hidden md:inline text-xs font-semibold text-blue-700 bg-blue-100 px-2 py-1 rounded">{statusSalvamento}</span>}
                      <button onClick={salvarDados} className="inline-flex items-center gap-2 rounded-md bg-green-600 px-3 py-2 text-sm font-medium text-white hover:bg-green-700 transition shadow-sm"><IconSave /> Salvar</button>
                      <button onClick={reset} className="inline-flex items-center gap-2 rounded-md border border-slate-200 bg-white px-3 py-2 text-sm font-medium hover:bg-slate-50 transition"><IconRotate /> Limpar</button>
                      <button onClick={() => window.print()} className="hidden md:inline-flex items-center gap-2 rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700 transition"><IconPrinter /> PDF</button>
                    </div>
                  </div>
                </header>

                <main className="mx-auto max-w-7xl px-6 py-8 space-y-6">
                  <section className="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
                    <h2 className="text-sm font-semibold uppercase tracking-wider text-slate-500 mb-4">Identificação da Obra</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <Field label="Nome da obra"><input value={obra} onChange={(e) => setObra(e.target.value)} className="w-full border border-slate-300 rounded-md p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" /></Field>
                      <Field label="Responsável"><input value={responsavel} onChange={(e) => setResponsavel(e.target.value)} className="w-full border border-slate-300 rounded-md p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" /></Field>
                      <Field label="Data"><input type="date" value={data} onChange={(e) => setData(e.target.value)} className="w-full border border-slate-300 rounded-md p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" /></Field>
                    </div>
                  </section>

                  <div className="flex items-center gap-2">
                    <span className="text-xs uppercase tracking-wider text-slate-500">Filtrar:</span>
                    {(["todos", "FÁBRICA", "ESTOQUE"]).map((f) => (
                      <button key={f} onClick={() => setFiltro(f)} className={`px-3 py-1 rounded-md text-xs font-medium border transition ${filtro === f ? "bg-blue-600 text-white border-blue-600" : "bg-white border-slate-200 hover:bg-slate-50"}`}>{f === "todos" ? "Todos" : f}</button>
                    ))}
                  </div>

                  {sections.map((s, idx) => (
                    <SectionCard key={s.title || idx} section={s} index={idx} quant={quant} setQuant={setQuant} overrides={overrides} setOverrides={setOverrides} computedQty={computedQty} filtro={filtro} inputs={inputs} updateInput={updateInput} />
                  ))}

                  <footer className="text-center text-xs text-slate-500 py-6">{totalLinhasPreenchidas} itens preenchidos neste projeto.</footer>
                </main>
              </div>
              <PrintReport obra={obra} responsavel={responsavel} data={data} sections={sections} computedQty={computedQty} />
            </div>
          );
        }

        function Field({ label, children }) {
          return <label className="block"><span className="block text-xs font-medium text-slate-500 mb-1">{label}</span>{children}</label>;
        }

        function ParamInput({ param, inputs, updateInput }) {
          if (param.kind === "select") {
            return (
              <label className="block">
                <span className="block text-[11px] font-medium text-slate-500 mb-1">{param.label}</span>
                <select value={String(inputs[param.key] || "")} onChange={(e) => updateInput(param.key, e.target.value)} className="w-full border border-slate-300 rounded-md p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                  {(param.options || []).map((o) => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              </label>
            );
          }
          const value = inputs[param.key];
          return (
            <label className="block">
              <span className="block text-[11px] font-medium text-slate-500 mb-1">{param.label}{param.hint && <span className="text-slate-400 font-normal ml-1">({param.hint})</span>}</span>
              <input type="number" inputMode="decimal" step="any" min={0} value={value === 0 ? "" : (value || "")} onChange={(e) => updateInput(param.key, parseFloat(e.target.value) || 0)} placeholder="0" className="w-full border border-slate-300 rounded-md p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono" />
            </label>
          );
        }

        function SectionCard({ section, index, quant, setQuant, overrides, setOverrides, computedQty, filtro, inputs, updateInput }) {
          const visibleRows = (section.rows || []).filter((r) => r.isSubheader || filtro === "todos" || r.pedido === filtro);
          if (visibleRows.filter((r) => !r.isSubheader).length === 0) return null;

          return (
            <details open className="rounded-lg border border-slate-200 bg-white shadow-sm overflow-hidden mb-4">
              <summary className="cursor-pointer list-none px-5 py-4 flex items-center justify-between bg-slate-50 hover:bg-slate-100 transition">
                <div className="flex items-center gap-3"><span className="font-mono text-xs text-slate-500 tabular-nums">{String(index + 1).padStart(2, "0")}</span><h2 className="text-lg font-semibold">{section.title}</h2></div>
                <span className="text-xs text-slate-500 font-mono">{section.rows.filter((r) => !r.isSubheader).length} itens</span>
              </summary>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead className="bg-slate-50 border-y border-slate-200">
                    <tr className="text-left text-slate-500 text-xs uppercase tracking-wider">
                      <th className="px-3 py-2 font-medium w-20">Cód</th>
                      <th className="px-3 py-2 font-medium">Descrição</th>
                      <th className="px-3 py-2 font-medium w-32">Quant</th>
                      <th className="px-3 py-2 font-medium w-24">Pedido</th>
                      <th className="px-3 py-2 font-medium hidden md:table-cell">Complementar</th>
                    </tr>
                  </thead>
                  <tbody>
                    {visibleRows.map((r) => {
                      if (r.isSubheader) {
                        return <tr key={r.row} className="bg-slate-100 border-t border-slate-200"><td colSpan="5" className="px-3 py-2 font-semibold text-sm uppercase tracking-wide">{r.desc}</td></tr>;
                      }
                      const computed = isComputed(r.row);
                      const meta = computed ? computedFormulas[r.row] : null;
                      const params = rowParams[r.row];
                      
                      const hasOverride = overrides[r.row] !== undefined && overrides[r.row] !== "";
                      const value = computed ? (hasOverride ? overrides[r.row] : computedQty[r.row]) : (quant[r.row] ?? "");

                      return (
                        <Fragment key={r.row}>
                          <tr className="border-t border-slate-200 hover:bg-slate-50 transition">
                            <td className="px-3 py-2 font-mono text-xs text-slate-500 tabular-nums">{r.cod}</td>
                            <td className="px-3 py-2">{r.desc}</td>
                            <td className="px-3 py-2">
                              {computed ? (
                                <input type="text" inputMode="decimal" value={value === 0 && !hasOverride ? "" : value} onChange={(e) => {
                                    const val = e.target.value;
                                    setOverrides((p) => { const newO = { ...p }; if (val === "") delete newO[r.row]; else newO[r.row] = val; return newO; });
                                  }} placeholder={meta?.formula ? "Auto" : "—"} 
                                  className={`w-full rounded-md px-2 py-1.5 font-mono text-sm font-semibold tabular-nums text-right outline-none transition-all ${hasOverride ? "bg-yellow-100 text-yellow-900 border border-yellow-400 focus:ring-2 focus:ring-yellow-500" : "bg-slate-100 text-slate-800 border border-transparent focus:ring-2 focus:ring-blue-500"}`}
                                  title={hasOverride ? "Forçado manualmente. Apague para restaurar a fórmula." : (meta?.formula ?? "")} />
                              ) : (
                                <input type="text" inputMode="decimal" value={value} onChange={(e) => setQuant((p) => ({ ...p, [r.row]: e.target.value }))} placeholder="—" className="w-full border border-slate-300 rounded-md px-2 py-1.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono text-right" />
                              )}
                            </td>
                            <td className="px-3 py-2">
                              {r.pedido && <span className={`inline-block text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded ${r.pedido === "FÁBRICA" ? "bg-blue-100 text-blue-700" : "bg-slate-200 text-slate-700"}`}>{r.pedido}</span>}
                            </td>
                            <td className="px-3 py-2 text-xs text-slate-500 hidden md:table-cell">{r.complementar}{meta && <div className="text-[10px] mt-0.5 italic opacity-70">{meta.formula}</div>}</td>
                          </tr>
                          {params && (
                            <tr key={`${r.row}-params`} className="bg-slate-50 border-t border-dashed border-slate-200">
                              <td></td>
                              <td colSpan="4" className="px-3 py-3">
                                <div className="text-[10px] uppercase tracking-wider text-slate-500 mb-2">Parâmetros para o cálculo desta linha</div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 max-w-2xl">
                                  {params.map((p) => <ParamInput key={p.key} param={p} inputs={inputs} updateInput={updateInput} />)}
                                </div>
                              </td>
                            </tr>
                          )}
                        </Fragment>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </details>
          );
        }

        function PrintReport({ obra, responsavel, data, sections, computedQty }) {
          const items = sections.flatMap((s) => (s.rows||[]).filter((r) => !r.isSubheader && (computedQty[r.row] ?? 0) > 0).map((r) => ({ section: s.title, cod: r.cod, desc: r.desc, qty: computedQty[r.row] ?? 0 })));
          return (
            <div className="hidden print:block text-black font-sans text-sm">
              <div className="border-b-2 border-black pb-2 mb-4">
                <h1 className="text-2xl font-bold mb-2">Lista de Materiais</h1>
                <div className="grid grid-cols-2 gap-2 text-xs">
                  <div><strong>Obra:</strong> {obra || "—"}</div>
                  <div><strong>Responsável:</strong> {responsavel || "—"}</div>
                  <div><strong>Data:</strong> {data}</div>
                  <div><strong>Total de itens:</strong> {items.length}</div>
                </div>
              </div>
              <table className="w-full border-collapse">
                <thead><tr className="border-b border-black text-left uppercase text-xs"><th className="pb-1 w-20">Código</th><th className="pb-1">Descrição</th><th className="pb-1 w-24 text-right">Quantidade</th></tr></thead>
                <tbody>
                  {items.map((it, i) => <tr key={i} className="border-b border-gray-300"><td className="py-1 font-mono">{it.cod || "—"}</td><td className="py-1">{it.desc}</td><td className="py-1 font-mono text-right font-semibold">{formatQty(it.qty)}</td></tr>)}
                  {items.length === 0 && <tr><td colSpan="3" className="text-center py-6">Nenhum item com quantidade preenchida.</td></tr>}
                </tbody>
              </table>
              <style>{`@media print { @page { margin: 18mm 14mm; size: A4; } }`}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MaterialsApp />);
    </script>
</body>
</html>
